<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ご縁マッチング | Connection Search</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --cta-color: #10b981;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --accent-red: #ef4444;
            
            /* SNS・連絡先用カラー */
            --line-color: #06c755;
            --insta-color: #e1306c;
            --mail-color: #475569;
        }

        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            padding: 48px 32px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            text-align: center;
            box-sizing: border-box;
        }

        .header-icon {
            font-size: 56px;
            margin-bottom: 20px;
            display: inline-block;
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0 0 12px 0;
            letter-spacing: -0.02em;
        }

        .description {
            font-size: 0.95rem;
            color: var(--text-sub);
            line-height: 1.7;
            margin-bottom: 36px;
        }

        .search-box {
            margin-bottom: 32px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 18px 22px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
            background: #f8fafc;
        }

        input:focus {
            border-color: var(--primary-color);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .search-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 14px;
        }

        .search-btn:active {
            transform: scale(0.97);
        }

        /* 外部リンク・SNSボタンセクション */
        .links-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
            text-align: left;
        }

        .links-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-sub);
            margin-bottom: 12px;
            text-align: center;
            letter-spacing: 0.05em;
        }

        .link-card {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            margin-bottom: 10px;
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-main);
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .link-card:active {
            transform: scale(0.98);
            background: #f1f5f9;
        }

        .link-card .icon {
            font-size: 1.25rem;
            margin-right: 12px;
            width: 24px;
            text-align: center;
        }

        .link-card.line { border-left: 4px solid var(--line-color); }
        .link-card.insta { border-left: 4px solid var(--insta-color); }
        .link-card.mail { border-left: 4px solid var(--mail-color); }

        /* 検索結果エリア */
        #result {
            display: none;
            margin-top: 36px;
            padding-top: 36px;
            border-top: 1px dashed #cbd5e1;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-text {
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.8;
            color: var(--text-main);
        }

        .count-number {
            font-size: 3.8rem;
            font-weight: 900;
            color: var(--accent-red);
            line-height: 1;
            display: block;
            margin: 16px 0;
        }

        .cta-message {
            font-weight: 700;
            font-size: 1rem;
            line-height: 1.6;
            margin: 24px 0;
            color: var(--text-main);
        }

        .cta-button {
            display: block;
            background: var(--cta-color);
            color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1.15rem;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
            transition: all 0.2s;
        }

        .cta-button:active {
            transform: translateY(2px);
        }

        .loading {
            display: none;
            margin-top: 24px;
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-icon">💎</div>
        <h2>ご縁マッチング検索</h2>
        <p class="description">
            私の人脈ネットワーク（2020年〜）から、<br>
            あなたに最適な候補をリアルタイムで照合します。
        </p>
        
        <div class="search-box">
            <input type="text" id="keyword" placeholder="例：誠実, 明るい, エンジニア">
            <button onclick="searchConnections()" class="search-btn">照合を開始する</button>
        </div>
        
        <div id="loading" class="loading">TAKARAMONO LIST 照合中...</div>

        <div id="result">
            <div class="result-text">
                私の人脈の宝物リストから<br>キーワード検索で
            </div>
            
            <span id="result-count" class="count-number">0</span>
            
            <div class="result-text" style="margin-bottom: 24px;">
                個 該当がありました。
            </div>
            
            <div id="cta-message-text" class="cta-message">
                より感度の高いご紹介のためにも、<br>
                1on1の日程調整をお願いします。
            </div>
            
            <a href="YOUR_SCHEDULE_TOOL_URL" class="cta-button">1on1の日程を調整する</a>
        </div>

        <div class="links-section">
            <div class="links-title">CONTACT & SNS</div>
            
            <a href="https://lin.ee/ZFVvxed" class="link-card line" target="_blank">
                <span class="icon">💬</span> お薬・サプリの相談（公式LINEへ）
            </a>
            
            <a href="https://www.instagram.com/yakuzaishi.loggy/" class="link-card insta" target="_blank">
                <span class="icon">📸</span> Instagramを見る
            </a>
            
            <a href="mailto:info.freeyakuzaishi@gmail.com" class="link-card mail">
                <span class="icon">✉️</span> お問い合わせ（メールを開く）
            </a>
        </div>

    </div>

    <script>
        function searchConnections() {
            const q = document.getElementById('keyword').value;
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            const countDisplay = document.getElementById('result-count');
            const ctaMessage = document.getElementById('cta-message-text');
            
            if(!q) return alert("キーワードを入力してください");

            // GASのウェブアプリURLをここに貼り付け
            const apiUrl = 'YOUR_GAS_WEB_APP_URL'; 

            loading.style.display = 'block';
            resultDiv.style.display = 'none';

            fetch(`${apiUrl}?q=${encodeURIComponent(q)}`)
            .then(res => res.json())
            .then(data => {
                loading.style.display = 'none';
                resultDiv.style.display = 'block';
                countDisplay.innerText = data.count;
                
                // 0件かそれ以上かでメッセージを条件分岐
                if (data.count === 0) {
                    ctaMessage.innerHTML = `より簡単なキーワードでお試しいただくか、<br>より感度の高いご紹介のためにも、<br>1on1の日程調整をお願いします。`;
                } else {
                    ctaMessage.innerHTML = `より感度の高いご紹介のためにも、<br>1on1の日程調整をお願いします。`;
                }
            })
            .catch(err => {
                loading.style.display = 'none';
                alert("通信エラーが発生しました。");
                console.error(err);
            });
        }
    </script>
</body>
</html>
