<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面談予約システム</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; font-size: 0.85rem; font-weight: bold; }
        input, button, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .slot-btn { background: #fff; color: #00b900; border: 2px solid #00b900; cursor: pointer; margin-bottom: 8px; font-size: 0.9rem; text-align: left; transition: 0.2s; }
        .slot-btn:hover { background: #eaffea; }
        .slot-btn.selected { background: #00b900; color: #fff; }
        #reserve-form { display: none; border-top: 2px solid #eee; margin-top: 20px; padding-top: 20px; }
        .btn-submit { background: #00b900; color: white; border: none; font-weight: bold; }
        .btn-submit:disabled { background: #ccc; }
        .option-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .check-item { display: flex; align-items: center; gap: 4px; font-size: 0.8rem; }
        .check-item input { width: auto; margin: 0; }
    </style>
</head>
<body>
<div class="card">
    <h2>📅 面談予約</h2>
    
    <label>1. 期間を選択</label>
    <div style="display: flex; gap: 5px;">
        <input type="date" id="start"> <span>〜</span> <input type="date" id="end">
    </div>
    
    <div class="option-group">
        <label class="check-item"><input type="checkbox" id="sat">土曜</label>
        <label class="check-item"><input type="checkbox" id="sun">日曜</label>
        <label class="check-item"><input type="checkbox" id="hol">祝日</label>
        <label class="check-item"><input type="checkbox" id="comb" checked>時間をまとめる</label>
    </div>

    <button onclick="loadSlots()">空き時間を表示</button>
    
    <div id="slot-container"></div>

    <div id="reserve-form">
        <label>2. 予約者情報を入力</label>
        <input type="text" id="name" placeholder="お名前">
        <input type="email" id="email" placeholder="メールアドレス">
        <textarea id="memo" placeholder="備考（あれば）" style="width:100%; height:60px; border-radius:8px; border:1px solid #ddd; padding:10px; box-sizing:border-box; margin-bottom:10px;"></textarea>
        <p id="selected-time-display" style="font-size: 0.9rem; color: #00b900; font-weight: bold;"></p>
        <button class="btn-submit" id="submit-btn" onclick="submitReservation()">予約を確定する</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwd1wLeT6ulr5C-VSiTr5lai2O0M51wvOy9I3-8WP_qMpuTZ2eHgBd41LZeeeDCjMWCZA/exec"; 
    let selectedSlot = null;

    // 初期日付セット
    const d = new Date();
    document.getElementById('start').valueAsDate = d;
    const next = new Date(); next.setDate(d.getDate() + 7);
    document.getElementById('end').valueAsDate = next;

    function loadSlots() {
        const p = {
            start: document.getElementById('start').value,
            end: document.getElementById('end').value,
            sat: document.getElementById('sat').checked,
            sun: document.getElementById('sun').checked,
            hol: document.getElementById('hol').checked,
            combined: document.getElementById('comb').checked,
            action: 'list'
        };

        const container = document.getElementById('slot-container');
        container.innerHTML = "読み込み中...";
        document.getElementById('reserve-form').style.display = "none";

        callGas(p, (res) => {
            container.innerHTML = "";
            if (res.slots.length === 0) {
                container.innerHTML = "空き時間がありません。";
                return;
            }
            res.slots.forEach(slot => {
                const btn = document.createElement('button');
                btn.className = "slot-btn";
                const start = new Date(slot.start);
                const end = new Date(slot.end);
                const timeStr = `${start.getMonth()+1}/${start.getDate()}(${['日','月','火','水','木','金','土'][start.getDay()]}) ${start.getHours()}:${String(start.getMinutes()).padStart(2,'0')}〜${end.getHours()}:${String(end.getMinutes()).padStart(2,'0')}`;
                btn.innerText = "・" + timeStr;
                btn.onclick = () => selectSlot(slot, timeStr, btn);
                container.appendChild(btn);
            });
        });
    }

    function selectSlot(slot, label, btn) {
        selectedSlot = slot;
        document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('reserve-form').style.display = "block";
        document.getElementById('selected-time-display').innerText = "選択中: " + label;
    }

    function submitReservation() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const memo = document.getElementById('memo').value;
        if (!name || !email) { alert("名前とメールアドレスを入力してください"); return; }

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "予約中...";

        const p = {
            action: 'reserve',
            startTime: selectedSlot.start,
            endTime: selectedSlot.end,
            name: name,
            email: email,
            memo: memo
        };

        callGas(p, (res) => {
            if (res.success) {
                alert("予約が完了しました！カレンダーをご確認ください。");
                location.reload();
            } else {
                alert("エラーが発生しました: " + res.error);
                btn.disabled = false;
                btn.innerText = "予約を確定する";
            }
        });
    }

    function callGas(params, callbackName) {
        const callbackId = "cb_" + Date.now();
        window[callbackId] = (data) => {
            callbackName(data);
            delete window[callbackId];
        };
        const query = Object.keys(params).map(k => `${k}=${encodeURIComponent(params[k])}`).join('&');
        const script = document.createElement('script');
        script.src = `${GAS_URL}?${query}&callback=${callbackId}`;
        document.body.appendChild(script);
        document.body.removeChild(script);
    }
</script>
</body>
</html>
