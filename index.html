<!DOCTYPE html>
<html>
<head>
    <title>スケ調整くん</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        input, button { width: 100%; margin-bottom: 10px; padding: 10px; box-sizing: border-box; }
        textarea { width: 100%; height: 200px; }
    </style>
</head>
<body>
    <h3>📅 スケジュール調整</h3>
    開始: <input type="date" id="start">
    終了: <input type="date" id="end">
    <label><input type="checkbox" id="combined" checked> 時間をまとめる</label>
    <button onclick="generate()">テキスト生成</button>
    <textarea id="result" placeholder="ここに結果が出ます"></textarea>
    <button onclick="copyText()">コピーしてLINEへ</button>

    <script>
        // デフォルトの日付（今日と1週間後）をセット
        document.getElementById('start').valueAsDate = new Date();
        const nextWeek = new Date();
        nextWeek.setDate(nextWeek.getDate() + 7);
        document.getElementById('end').valueAsDate = nextWeek;

        async function generate() {
            const start = document.getElementById('start').value;
            const end = document.getElementById('end').value;
            const combined = document.getElementById('combined').checked;
            const gasUrl = "https://script.google.com/macros/s/AKfycbym3uMCi_ZHcSDi-E4QOsOr45pg9MJr0FvkIyGiNSwY3SDMh5aQpzJeTXecHTlfzNVb/exec";

            const res = await fetch(`${gasUrl}?start=${start}&end=${end}&combined=${combined}`);
            const text = await res.text();
            document.getElementById('result').value = text;
        }

        function copyText() {
            const txt = document.getElementById('result');
            txt.select();
            document.execCommand('copy');
            alert("コピーしました！LINEに貼り付けてください。");
        }
    </script>
</body>
</html>
